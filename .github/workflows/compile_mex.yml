name: Compile TFCE mex-files

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile_mex:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # On Linux, the OS version should be as old as possible for mex compatibility.
          - os: ubuntu-22.04
            os_name: Linux
            mex_ext: mexa64
            matlab_release: R2020a
            matlab_legacy: true
          # On Mac and Windows, only the Matlab version matters for mex compatibility, so the OS can be the latest.
          - os: macos-15-intel
            os_name: macOS_Intel
            mex_ext: mexmaci64
            matlab_release: R2020a
            matlab_legacy: true
          - os: macos-latest
            os_name: macOS_Apple_Silicon
            mex_ext: mexmaca64
            matlab_release: R2023b
            matlab_legacy: false
          - os: windows-latest
            os_name: Windows
            mex_ext: mexw64
            matlab_release: R2022a
            matlab_legacy: true

    steps:
      - name: Set up MATLAB (legacy)
        if: ${{ matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@v1
        with:
          release: ${{ matrix.matlab_release }}
      - name: Set up MATLAB
        if: ${{ !matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.matlab_release }}

      - name: Checkout TFCE
        # Checked out into TFCE/ so that the zip carries the toolbox folder name.
        uses: actions/checkout@v4
        with:
          path: TFCE

      - name: Delete old mex-files on Linux and Mac
        if: runner.os != 'Windows'
        run: find TFCE -type f -name "*.mex*" -delete

      - name: Delete old mex-files on Windows
        if: runner.os == 'Windows'
        run: Get-ChildItem -Path .\TFCE -Recurse -Include *.mex* | Remove-Item -Force

      # MATLAB does not pick up the Visual Studio installation of the runner, so
      # point it at the MinGW-w64 toolchain that comes with the image instead.
      # MW_MINGW64_LOC is the documented way to register MinGW for a headless mex.
      - name: Set up MinGW for MATLAB on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          for loc in /c/msys64/mingw64 /c/mingw64 /c/ProgramData/mingw64/mingw64; do
            if [ -x "$loc/bin/gcc.exe" ]; then
              win=$(cygpath -w "$loc")
              echo "Using MinGW at $win"
              "$loc/bin/gcc.exe" --version | head -1
              echo "MW_MINGW64_LOC=$win" >> $GITHUB_ENV
              exit 0
            fi
          done
          echo "ERROR: no MinGW-w64 with gcc.exe found on this runner"
          exit 1

      # compile(1) raises an error when a mex-file cannot be built, so that the
      # job fails instead of silently uploading an incomplete archive.
      - name: Compile TFCE mex-files (legacy)
        if: ${{ matrix.matlab_legacy }}
        uses: matlab-actions/run-command@v1
        with:
          command: |
            cd(fullfile(getenv('GITHUB_WORKSPACE'), 'TFCE', 'matlab'))
            compile(1)

      - name: Compile TFCE mex-files
        if: ${{ !matrix.matlab_legacy }}
        uses: matlab-actions/run-command@v2
        with:
          command: |
            cd(fullfile(getenv('GITHUB_WORKSPACE'), 'TFCE', 'matlab'))
            compile(1)

      # The sources live in TFCE/matlab and the shared C core in TFCE/c; compile.m
      # writes the mex-files back beside its own sources.
      - name: Check that all mex-files were built
        shell: bash
        run: |
          missing=0
          for f in tfceMex_maxtree tfceMex_maxtree_batch tfceMex_resss; do
            if [ ! -f "TFCE/matlab/$f.${{ matrix.mex_ext }}" ]; then
              echo "MISSING: TFCE/matlab/$f.${{ matrix.mex_ext }}"
              missing=1
            else
              echo "ok: TFCE/matlab/$f.${{ matrix.mex_ext }}"
            fi
          done
          exit $missing

      # Collect the mex-files under a TFCE folder so that the downloaded archive
      # unpacks straight into the SPM toolbox directory -- which is flat, hence
      # the mex-files are collected out of matlab/ and not under it. Do NOT zip
      # here: upload-artifact always zips what it is given, and zipping a zip of
      # the same name produces an archive that many tools refuse to unpack.
      - name: Collect mex-files
        shell: bash
        run: |
          mkdir -p dist/TFCE
          cp TFCE/matlab/*.${{ matrix.mex_ext }} dist/TFCE/
          ls -l dist/TFCE

      - name: Upload mex-files
        uses: actions/upload-artifact@v4
        with:
          name: tfce_${{ github.ref_name }}_${{ matrix.mex_ext }}
          path: dist/

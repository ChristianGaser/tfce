name: Compile TFCE mex-files

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile_mex:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # On Linux, the OS version should be as old as possible for mex compatibility.
          - os: ubuntu-22.04
            os_name: Linux
            mex_ext: mexa64
            matlab_release: R2020a
            matlab_legacy: true
          # On Mac and Windows, only the Matlab version matters for mex compatibility, so the OS can be the latest.
          - os: macos-15-intel
            os_name: macOS_Intel
            mex_ext: mexmaci64
            matlab_release: R2020a
            matlab_legacy: true
          - os: macos-latest
            os_name: macOS_Apple_Silicon
            mex_ext: mexmaca64
            matlab_release: R2023b
            matlab_legacy: false
          - os: windows-latest
            os_name: Windows
            mex_ext: mexw64
            matlab_release: R2022a
            matlab_legacy: true

    steps:
      - name: Set up MATLAB (legacy)
        if: ${{ matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@v1
        with:
          release: ${{ matrix.matlab_release }}
      - name: Set up MATLAB
        if: ${{ !matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.matlab_release }}

      - name: Checkout TFCE
        # Checked out into TFCE/ so that the zip carries the toolbox folder name.
        uses: actions/checkout@v4
        with:
          path: TFCE

      - name: Delete old mex-files on Linux and Mac
        if: runner.os != 'Windows'
        run: find TFCE -type f -name "*.mex*" -delete

      - name: Delete old mex-files on Windows
        if: runner.os == 'Windows'
        run: Get-ChildItem -Path .\TFCE -Recurse -Include *.mex* | Remove-Item -Force

      # compile(1) raises an error when a mex-file cannot be built, so that the
      # job fails instead of silently uploading an incomplete archive.
      - name: Compile TFCE mex-files (legacy)
        if: ${{ matrix.matlab_legacy }}
        uses: matlab-actions/run-command@v1
        with:
          command: |
            cd(fullfile(getenv('GITHUB_WORKSPACE'), 'TFCE'))
            compile(1)

      - name: Compile TFCE mex-files
        if: ${{ !matrix.matlab_legacy }}
        uses: matlab-actions/run-command@v2
        with:
          command: |
            cd(fullfile(getenv('GITHUB_WORKSPACE'), 'TFCE'))
            compile(1)

      - name: Check that all mex-files were built
        shell: bash
        run: |
          missing=0
          for f in tfceMex_maxtree tfceMex_maxtree_batch tfceMex_resss; do
            if [ ! -f "TFCE/$f.${{ matrix.mex_ext }}" ]; then
              echo "MISSING: TFCE/$f.${{ matrix.mex_ext }}"
              missing=1
            else
              echo "ok: TFCE/$f.${{ matrix.mex_ext }}"
            fi
          done
          exit $missing

      - name: Install zip on Windows
        if: runner.os == 'Windows'
        run: choco install zip -y
        shell: bash

      - name: Zip mex-files
        shell: bash
        run: zip -r tfce_${{ github.ref_name }}_${{ matrix.mex_ext }}.zip TFCE/*.${{ matrix.mex_ext }}

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: tfce_${{ github.ref_name }}_${{ matrix.mex_ext }}
          path: tfce_*.zip
